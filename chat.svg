<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0084ff"/>
      <stop offset="100%" style="stop-color:#0073e6"/>
    </linearGradient>
  </defs>

  <!-- Clean background -->
  <rect width="600" height="280" fill="#ffffff"/>

  <!-- Message 1: User (right) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <rect x="350" y="20" width="220" height="28" rx="14" fill="url(#userBubble)"/>
    <text x="365" y="38" fill="#ffffff" font-size="13" font-weight="500" font-family="sans-serif">
      Tell me about yourself!
    </text>
  </g>

  <!-- Message 2: Bot (left) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <rect x="30" y="70" width="430" height="40" rx="12" fill="#e8e8e8"/>
    <text x="45" y="85" fill="#1c1c1e" font-size="13" font-weight="400" font-family="sans-serif">
      Hey! I'm a self-taught dev &amp; aspiring AI Engineer
    </text>
    <text x="45" y="102" fill="#1c1c1e" font-size="13" font-weight="400" font-family="sans-serif">
      in my final year. I love solving hard problems. ⚡
    </text>
  </g>

  <!-- Message 3: User (right) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
    <rect x="310" y="135" width="260" height="28" rx="14" fill="url(#userBubble)"/>
    <text x="325" y="153" fill="#ffffff" font-size="13" font-weight="500" font-family="sans-serif">
      What are you building lately?
    </text>
  </g>

  <!-- Message 4: Bot (left) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    <rect x="30" y="185" width="480" height="40" rx="12" fill="#e8e8e8"/>
    <text x="45" y="200" fill="#1c1c1e" font-size="13" font-weight="400" font-family="sans-serif">
      I'm deep into RAG systems 🛠️  Building <tspan font-weight="700">BookFriend</tspan> to chat
    </text>
    <text x="45" y="217" fill="#1c1c1e" font-size="13" font-weight="400" font-family="sans-serif">
      with books &amp; refining <tspan font-weight="700">FaceSense</tspan> for emotion recognition.
    </text>
  </g>
</svg>
