<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0084ff"/>
      <stop offset="100%" style="stop-color:#0073e6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#f9f9f9"/>

  <!-- Message 1: User -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <rect x="395" y="12" width="185" height="20" rx="10" fill="url(#userBubble)"/>
    <text x="405" y="25" fill="#fff" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Tell me about yourself!</text>
  </g>

  <!-- Message 2: Bot -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <rect x="20" y="42" width="430" height="28" rx="9" fill="#e5e5ea"/>
    <text x="28" y="53" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif">Hey! I'm a self-taught dev &amp; aspiring AI Engineer in my</text>
    <text x="28" y="66" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif">final year. I love solving hard problems. ⚡</text>
  </g>

  <!-- Message 3: User -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
    <rect x="355" y="85" width="220" height="20" rx="10" fill="url(#userBubble)"/>
    <text x="365" y="98" fill="#fff" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif">What are you building lately?</text>
  </g>

  <!-- Message 4: Bot -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    <rect x="20" y="115" width="470" height="28" rx="9" fill="#e5e5ea"/>
    <text x="28" y="126" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif">I'm deep into RAG systems 🛠️ Building <tspan font-weight="700">BookFriend</tspan> to chat with books</text>
    <text x="28" y="139" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif">&amp; refining <tspan font-weight="700">FaceSense</tspan> for emotion recognition.</text>
  </g>
</svg>
