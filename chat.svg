<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0084ff"/>
      <stop offset="100%" style="stop-color:#0073e6"/>
    </linearGradient>
  </defs>

  <!-- Clean background -->
  <rect width="600" height="240" fill="#ffffff"/>

  <!-- Message 1: User (right) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <rect x="380" y="15" width="200" height="22" rx="11" fill="url(#userBubble)"/>
    <text x="390" y="29" fill="#ffffff" font-size="12" font-weight="500" font-family="sans-serif">Tell me about yourself!</text>
  </g>

  <!-- Message 2: Bot (left) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <rect x="20" y="50" width="420" height="32" rx="10" fill="#e8e8e8"/>
    <text x="30" y="62" fill="#1c1c1e" font-size="12" font-weight="400" font-family="sans-serif">Hey! I'm a self-taught dev &amp; aspiring AI Engineer in my final year.</text>
    <text x="30" y="76" fill="#1c1c1e" font-size="12" font-weight="400" font-family="sans-serif">I love solving hard problems. ⚡</text>
  </g>

  <!-- Message 3: User (right) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
    <rect x="340" y="100" width="240" height="22" rx="11" fill="url(#userBubble)"/>
    <text x="350" y="114" fill="#ffffff" font-size="12" font-weight="500" font-family="sans-serif">What are you building lately?</text>
  </g>

  <!-- Message 4: Bot (left) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    <rect x="20" y="135" width="470" height="32" rx="10" fill="#e8e8e8"/>
    <text x="30" y="147" fill="#1c1c1e" font-size="12" font-weight="400" font-family="sans-serif">I'm deep into RAG systems 🛠️ Building <tspan font-weight="700">BookFriend</tspan> to chat with books</text>
    <text x="30" y="161" fill="#1c1c1e" font-size="12" font-weight="400" font-family="sans-serif">&amp; refining <tspan font-weight="700">FaceSense</tspan> for emotion recognition.</text>
  </g>
</svg>
