<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0084ff"/>
      <stop offset="100%" style="stop-color:#0073e6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="180" fill="#f9f9f9"/>

  <!-- Message 1: User -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <rect x="395" y="8" width="185" height="18" rx="9" fill="url(#userBubble)"/>
    <text x="405" y="18" fill="#fff" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif" dominant-baseline="middle">Tell me about yourself!</text>
  </g>

  <!-- Message 2: Bot -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <rect x="20" y="35" width="430" height="24" rx="8" fill="#e5e5ea"/>
    <text x="28" y="43" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif" dominant-baseline="middle">Hey! I'm a self-taught dev &amp; aspiring AI Engineer in my final year.</text>
    <text x="28" y="57" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif" dominant-baseline="middle">I love solving hard problems. ⚡</text>
  </g>

  <!-- Message 3: User -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
    <rect x="355" y="75" width="220" height="18" rx="9" fill="url(#userBubble)"/>
    <text x="365" y="85" fill="#fff" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif" dominant-baseline="middle">What are you building lately?</text>
  </g>

  <!-- Message 4: Bot -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
    <rect x="20" y="105" width="470" height="24" rx="8" fill="#e5e5ea"/>
    <text x="28" y="113" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif" dominant-baseline="middle">I'm deep into RAG systems 🛠️ Building <tspan font-weight="700">BookFriend</tspan> to chat with books</text>
    <text x="28" y="127" fill="#000" font-size="12" font-weight="400" font-family="system-ui, -apple-system, sans-serif" dominant-baseline="middle">&amp; refining <tspan font-weight="700">FaceSense</tspan> for emotion recognition.</text>
  </g>
</svg>
