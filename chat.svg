<svg width="600" height="280" viewBox="0 0 600 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Base text styling */
    .bot-txt { fill: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; }
    .user-txt { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; }
    
    /* Bubble colors */
    .bot-bub { fill: #E9E9EB; }
    .user-bub { fill: #007AFF; }
    
    /* Dark Mode overrides */
    @media (prefers-color-scheme: dark) {
      .bot-bub { fill: #262628; }
      .bot-txt { fill: #FFFFFF; }
      /* User bubble stays blue in dark mode */
    }

    /* Smooth popup animation */
    .fade-in { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(8px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>

  <g class="fade-in" style="animation-delay: 0.2s">
    <rect x="403" y="20" width="177" height="38" rx="18" class="user-bub"/>
    <text x="419" y="44" class="user-txt">Tell me about yourself!</text>
  </g>

  <g class="fade-in" style="animation-delay: 0.8s">
    <rect x="20" y="70" width="412" height="58" rx="18" class="bot-bub"/>
    <text x="36" y="94" class="bot-txt">Hey! I'm a self-taught dev &amp; aspiring AI Engineer in my final year.</text>
    <text x="36" y="114" class="bot-txt">I love solving hard problems. ⚡</text>
  </g>

  <g class="fade-in" style="animation-delay: 1.6s">
    <rect x="363" y="140" width="217" height="38" rx="18" class="user-bub"/>
    <text x="379" y="164" class="user-txt">What are you building lately?</text>
  </g>

  <g class="fade-in" style="animation-delay: 2.4s">
    <rect x="20" y="190" width="422" height="58" rx="18" class="bot-bub"/>
    <text x="36" y="214" class="bot-txt">I'm deep into RAG systems 🛠️ Building <tspan font-weight="600">BookFriend</tspan> to chat with books</text>
    <text x="36" y="234" class="bot-txt">&amp; refining <tspan font-weight="600">FaceSense</tspan> for emotion recognition.</text>
  </g>
</svg>
